# ============================================================
# LOCAL AI STACK — MacBook Air M4 16GB
# Services: SearXNG · Flowise · n8n
# Ollama runs natively via Homebrew on host (port 11434)
# SynapseAI custom frontend runs locally (see frontend/ + backend/)
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Custom frontend: cd frontend && npm run dev
# Custom backend:  cd backend && uvicorn main:app --reload
# ============================================================

services:

  # ─────────────────────────────────────────
  # 1. SEARXNG — Private self-hosted search
  #    Powers web search in SynapseAI
  #    UI: http://localhost:8080
  # ─────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
      - SEARXNG_SECRET_KEY=localai_secret_key_change_this
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  # ─────────────────────────────────────────
  # 2. FLOWISE — Visual AI workflow builder
  #    LangChain-powered, drag-and-drop
  #    Build RAG pipelines, agents, chatbots
  #    UI: http://localhost:3001  login: admin / localai123
  # ─────────────────────────────────────────
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - flowise_data:/root/.flowise
    environment:
      - PORT=3000
      - FLOWISE_USERNAME=admin
      - FLOWISE_PASSWORD=localai123
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - SECRETKEY_PATH=/root/.flowise
      - LOG_PATH=/root/.flowise/logs
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # 3. N8N — Automation workflow engine
  #    Automate tasks with 400+ integrations
  #    UI: http://localhost:5678  login: admin@local.ai / Admin12345
  # ─────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678
      - N8N_AI_ENABLED=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_SKIP_OWNER_SETUP=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ─────────────────────────────────────────
# PERSISTENT VOLUMES
# ─────────────────────────────────────────
volumes:
  searxng_data:
    driver: local
  flowise_data:
    driver: local
  n8n_data:
    driver: local
